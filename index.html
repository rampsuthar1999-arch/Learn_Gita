<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>भगवद्गीता कण्ठस्थ परीक्षा</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#c9a24b">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="गीता परीक्षा">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
@font-face {
  font-family: 'NotoDev';
  src: local('Noto Sans Devanagari');
}
:root{
  --bg:#0f1720;
  --panel:#162232;
  --panel2:#1b2b3d;
  --gold:#c9a24b;
  --gold-soft:#e8d5a3;
  --saffron:#d98e3d;
  --text:#eef2f5;
  --muted:#93a3b3;
  --line:#2a3b4d;
  --shadow: 0 10px 30px rgba(0,0,0,0.4);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:
    radial-gradient(ellipse at top, #1a2a3c 0%, var(--bg) 55%),
    var(--bg);
  color:var(--text);
  font-family: 'Tiro Devanagari Hindi', 'Noto Sans Devanagari', 'Hind', system-ui, sans-serif;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding: 20px 14px 60px;
}
.wrap{ width:100%; max-width:640px; }
header.top{
  text-align:center;
  margin-bottom:18px;
}
.om{
  font-size:28px;
  color:var(--gold);
  letter-spacing:2px;
  opacity:0.9;
}
h1{
  font-family: 'Tiro Devanagari Sanskrit','Tiro Devanagari Hindi', serif;
  font-size: clamp(26px,6vw,34px);
  margin:6px 0 2px;
  color:var(--gold-soft);
  font-weight:600;
}
.subtitle{
  color:var(--muted);
  font-size:14px;
  letter-spacing:0.5px;
}
.progress-card{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:14px;
  padding:14px 18px;
  margin-bottom:18px;
  display:flex;
  align-items:center;
  gap:14px;
}
.progress-bar-track{
  flex:1;
  height:8px;
  background:#0c1620;
  border-radius:6px;
  overflow:hidden;
  border:1px solid var(--line);
}
.progress-bar-fill{
  height:100%;
  background:linear-gradient(90deg,var(--saffron),var(--gold));
  width:0%;
  transition:width .4s ease;
}
.progress-label{
  font-size:13px;
  color:var(--muted);
  white-space:nowrap;
  min-width:74px;
  text-align:right;
}
.scope-bar{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:16px;
}
.scope-summary{
  flex:1;
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:10px;
  padding:11px 14px;
  font-size:13.5px;
  color:var(--muted);
  cursor:pointer;
  transition:border-color .15s ease;
}
.scope-summary:hover{ border-color:var(--gold); }
.scope-summary .scope-value{ color:var(--text); font-weight:600; }
.modal-overlay{
  position:fixed; inset:0;
  background:rgba(6,10,14,0.72);
  display:none;
  align-items:flex-end;
  justify-content:center;
  z-index:50;
}
.modal-overlay.open{ display:flex; }
.modal-sheet{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:20px 20px 0 0;
  width:100%;
  max-width:640px;
  max-height:82vh;
  overflow-y:auto;
  padding:22px 20px 26px;
  box-shadow:0 -10px 40px rgba(0,0,0,0.5);
}
@media (min-width:640px){
  .modal-overlay{ align-items:center; }
  .modal-sheet{ border-radius:18px; max-height:80vh; }
}
.modal-title{
  font-family:'Tiro Devanagari Sanskrit', serif;
  color:var(--gold-soft);
  font-size:19px;
  margin-bottom:14px;
}
.modal-quick-actions{
  display:flex; gap:8px; margin-bottom:14px;
}
.modal-quick-btn{
  flex:1;
  padding:9px 10px;
  border-radius:9px;
  border:1px solid var(--line);
  background:var(--panel2);
  color:var(--text);
  font-family:inherit;
  font-size:13px;
  cursor:pointer;
}
.modal-quick-btn:hover{ border-color:var(--gold); }
.chapter-grid{
  display:flex;
  flex-direction:column;
  gap:6px;
  margin-bottom:18px;
}
.chapter-row{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 12px;
  border-radius:10px;
  border:1px solid var(--line);
  background:var(--panel2);
  cursor:pointer;
  transition:border-color .15s ease;
}
.chapter-row:hover{ border-color:var(--gold); }
.chapter-row input[type=checkbox]{
  width:18px; height:18px; accent-color:var(--gold); flex-shrink:0;
}
.chapter-row .chnum{
  font-family:'Tiro Devanagari Sanskrit', serif;
  color:var(--gold-soft);
  font-size:15px;
  min-width:26px;
}
.chapter-row .chtitle{
  font-size:14px;
  color:var(--text);
}
.chapter-row .chcount{
  margin-left:auto;
  font-size:12px;
  color:var(--muted);
}
.modal-actions{
  display:flex; gap:10px;
}
.mode-toggle{
  display:flex;
  gap:6px;
  margin-bottom:16px;
  flex-wrap:wrap;
}
.mode-pill{
  flex:1;
  min-width:96px;
  padding:10px 8px;
  border-radius:10px;
  border:1px solid var(--line);
  background:var(--panel);
  color:var(--muted);
  font-family:inherit;
  font-size:12.5px;
  line-height:1.3;
  cursor:pointer;
  transition:all .15s ease;
  text-align:center;
}
.mode-pill:hover{ border-color:var(--gold); color:var(--text); }
.mode-pill.active{
  background:linear-gradient(135deg,var(--gold),var(--saffron));
  color:#1a1408;
  border-color:transparent;
  font-weight:600;
}

/* ---- Timed test styles ---- */
.timer-topbar{
  display:none;
  align-items:center;
  justify-content:space-between;
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:12px;
  padding:10px 16px;
  margin-bottom:14px;
  font-size:13.5px;
  color:var(--muted);
}
.timer-topbar.show{ display:flex; }
.timer-topbar .timer-value{
  font-family:'Tiro Devanagari Sanskrit', serif;
  font-size:18px;
  color:var(--gold-soft);
  font-weight:700;
}
.timer-topbar .timer-value.low{ color:#e5695f; }
.setup-style-grid{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-bottom:18px;
}
.setup-style-card{
  border:1px solid var(--line);
  background:var(--panel2);
  border-radius:12px;
  padding:14px 16px;
  cursor:pointer;
  transition:border-color .15s ease;
}
.setup-style-card:hover{ border-color:var(--gold); }
.setup-style-card.active{
  border-color:var(--gold);
  background:rgba(201,162,75,0.1);
}
.setup-style-card .style-title{
  font-family:'Tiro Devanagari Sanskrit', serif;
  font-size:16px;
  color:var(--gold-soft);
  margin-bottom:4px;
}
.setup-style-card .style-desc{
  font-size:13px;
  color:var(--muted);
  line-height:1.5;
}
.duration-pills{
  display:flex;
  gap:8px;
  margin:14px 0 4px;
  flex-wrap:wrap;
}
.duration-pill{
  padding:8px 16px;
  border-radius:20px;
  border:1px solid var(--line);
  background:var(--panel2);
  color:var(--text);
  font-family:inherit;
  font-size:13.5px;
  cursor:pointer;
}
.duration-pill:hover{ border-color:var(--gold); }
.duration-pill.active{
  background:linear-gradient(135deg,var(--gold),var(--saffron));
  color:#1a1408;
  border-color:transparent;
  font-weight:600;
}
.big-timer{
  text-align:center;
  font-family:'Tiro Devanagari Sanskrit', serif;
  font-size:clamp(44px,14vw,64px);
  font-weight:700;
  color:var(--gold-soft);
  margin:6px 0 4px;
  line-height:1;
}
.big-timer.low{ color:#e5695f; }
.timeout-tag{
  text-align:center;
  color:#e5695f;
  font-size:13px;
  font-weight:600;
  margin-bottom:10px;
}
.stopwatch-line{
  text-align:center;
  color:var(--muted);
  font-size:14px;
  margin:4px 0 18px;
}
.result-stats{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
  margin:16px 0;
}
.result-stat{
  background:var(--panel2);
  border:1px solid var(--line);
  border-radius:12px;
  padding:12px 18px;
  text-align:center;
  min-width:100px;
}
.result-stat .stat-value{
  font-family:'Tiro Devanagari Sanskrit', serif;
  font-size:22px;
  color:var(--gold-soft);
  display:block;
}
.result-stat .stat-label{
  font-size:11.5px;
  color:var(--muted);
  margin-top:2px;
}
.card{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:18px;
  box-shadow:var(--shadow);
  padding:30px 26px 26px;
  position:relative;
  overflow:hidden;
}
.card::before{
  content:"";
  position:absolute;
  top:0;left:0;right:0;
  height:3px;
  background:linear-gradient(90deg, transparent, var(--gold), transparent);
}
.prompt-eyebrow{
  text-transform:uppercase;
  letter-spacing:2px;
  font-size:11px;
  color:var(--saffron);
  font-family: system-ui, sans-serif;
  margin-bottom:10px;
}
.chapter-title{
  color:var(--muted);
  font-size:14px;
  margin-bottom:2px;
}
.verse-ref{
  font-size:clamp(38px,10vw,54px);
  color:var(--gold-soft);
  font-family:'Tiro Devanagari Sanskrit', serif;
  font-weight:700;
  line-height:1.1;
  margin:6px 0 4px;
}
.verse-ref .small{
  font-size:0.4em;
  color:var(--muted);
  font-weight:400;
  display:block;
  margin-top:4px;
}
.recall-hint{
  color:var(--muted);
  font-size:14px;
  margin:14px 0 22px;
  line-height:1.6;
}
.btn{
  display:inline-block;
  width:100%;
  text-align:center;
  padding:15px 20px;
  border-radius:12px;
  border:none;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  transition:transform .15s ease, filter .15s ease;
  font-family: inherit;
}
.btn:active{ transform:scale(0.98); }
.btn-primary{
  background:linear-gradient(135deg,var(--gold),var(--saffron));
  color:#1a1408;
}
.btn-primary:hover{ filter:brightness(1.08); }
.btn-secondary{
  background:transparent;
  border:1px solid var(--line);
  color:var(--text);
  margin-top:10px;
}
.btn-secondary:hover{ border-color:var(--gold); }
.divider-speaker{
  text-align:center;
  color:var(--saffron);
  font-size:15px;
  font-family:'Tiro Devanagari Sanskrit', serif;
  margin:4px 0 16px;
  position:relative;
}
.divider-speaker::before, .divider-speaker::after{
  content:"";
  position:absolute;
  top:50%;
  width:30%;
  height:1px;
  background:var(--line);
}
.divider-speaker::before{ left:0; }
.divider-speaker::after{ right:0; }
.shloka-text{
  font-family:'Tiro Devanagari Sanskrit', serif;
  font-size:clamp(20px,5vw,25px);
  line-height:2;
  text-align:center;
  white-space:pre-line;
  color:var(--text);
  padding:6px 4px 8px;
}
.answer-meta{
  text-align:center;
  color:var(--muted);
  font-size:13px;
  margin-bottom:6px;
  font-family: system-ui, sans-serif;
}
footer.note{
  text-align:center;
  color:var(--muted);
  font-size:12px;
  margin-top:22px;
  line-height:1.7;
}
.done-banner{
  text-align:center;
  padding:40px 20px;
}
.done-banner .om{ font-size:40px; }
.done-banner h2{
  font-family:'Tiro Devanagari Sanskrit', serif;
  color:var(--gold-soft);
  margin:10px 0;
}
.done-banner p{ color:var(--muted); font-size:14px; }
@media (min-width:600px){
  .card{ padding:40px 44px 34px; }
}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="om">ॐ</div>
    <h1>भगवद्गीता कण्ठस्थ परीक्षा</h1>
    <div class="subtitle">श्लोक क्रमांक स्मरण परीक्षा · अठारह अध्याय · 700 श्लोक</div>
  </header>

  <div class="progress-card" id="progressCard">
    <div class="progress-label" id="progressLabel">0 / 700</div>
    <div class="progress-bar-track"><div class="progress-bar-fill" id="progressFill"></div></div>
    <div class="progress-label" id="roundLabel">चक्र 1</div>
  </div>

  <div class="scope-bar">
    <div class="scope-summary" id="scopeSummary">
      अध्याय चयन: <span class="scope-value" id="scopeValue">सम्पूर्ण गीता (18 अध्याय)</span>
    </div>
  </div>

  <div class="mode-toggle" id="modeToggle">
    <button class="mode-pill" data-mode="random" id="modeRandomBtn">यादृच्छिक क्रम</button>
    <button class="mode-pill" data-mode="sequential" id="modeSeqBtn">क्रमबद्ध क्रम</button>
    <button class="mode-pill" data-mode="timed" id="modeTimedBtn">समयबद्ध परीक्षा</button>
  </div>

  <div class="timer-topbar" id="timerTopbar">
    <span id="timerTopbarLabel">शेष समय</span>
    <span class="timer-value" id="timerTopbarValue">00:00</span>
  </div>

  <div class="card" id="mainCard">
    <!-- populated by JS -->
  </div>

  <footer class="note">
    प्रगति इस उपकरण में स्थानीय रूप से सहेजी जाती है। "रीसेट" दबाकर आप पुनः आरंभ कर सकते हैं।
  </footer>
</div>

<div class="modal-overlay" id="scopeModalOverlay">
  <div class="modal-sheet">
    <div class="modal-title">कौन से अध्याय शामिल करें?</div>
    <div class="modal-quick-actions">
      <button class="modal-quick-btn" id="selectAllBtn">सम्पूर्ण गीता चुनें</button>
      <button class="modal-quick-btn" id="clearAllBtn">सभी हटाएँ</button>
    </div>
    <div class="chapter-grid" id="chapterGrid"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" id="cancelScopeBtn" style="margin-top:0;">रद्द करें</button>
      <button class="btn btn-primary" id="applyScopeBtn">लागू करें</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="confirmModalOverlay">
  <div class="modal-sheet" style="max-width:420px;">
    <div class="modal-title" id="confirmModalTitle">पुष्टि करें</div>
    <div style="color:var(--muted); font-size:14.5px; line-height:1.6; margin-bottom:20px;" id="confirmModalMessage"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" id="confirmModalCancelBtn" style="margin-top:0;">नहीं</button>
      <button class="btn btn-primary" id="confirmModalOkBtn">हाँ</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="infoModalOverlay">
  <div class="modal-sheet" style="max-width:420px;">
    <div style="color:var(--text); font-size:14.5px; line-height:1.6; margin-bottom:20px;" id="infoModalMessage"></div>
    <div class="modal-actions">
      <button class="btn btn-primary" id="infoModalOkBtn">ठीक है</button>
    </div>
  </div>
</div>

const STORAGE_KEY = 'gitaTestProgressV3';

const CHAPTER_TITLES = {};
GITA.forEach(item => { if(!(item.c in CHAPTER_TITLES)) CHAPTER_TITLES[item.c] = item.ct; });
const ALL_CHAPTERS = Object.keys(CHAPTER_TITLES).map(Number).sort((a,b)=>a-b);

function defaultProgress(){
  return {
    mode: 'random',
    selectedChapters: ALL_CHAPTERS.slice(),
    random: { tested: [], round: 1, pending: null },
    sequential: { position: 0, round: 1 },
    timedConfig: { style: 'countdown', perShlokaSeconds: 15, sessionMinutes: 5, order: 'random' }
  };
}

let progress = loadProgress();
let revealed = false;

function loadProgress(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return migrateOld();
    const parsed = JSON.parse(raw);
    if(!parsed.random || !parsed.sequential) return defaultProgress();
    if(!Array.isArray(parsed.selectedChapters) || parsed.selectedChapters.length === 0){
      parsed.selectedChapters = ALL_CHAPTERS.slice();
    }
    if(!parsed.timedConfig){
      parsed.timedConfig = { style: 'countdown', perShlokaSeconds: 15, sessionMinutes: 5, order: 'random' };
    }
    if(!parsed.timedConfig.order){
      parsed.timedConfig.order = 'random';
    }
    return parsed;
  }catch(e){
    return defaultProgress();
  }
}

// migrate from earlier versions if present
function migrateOld(){
  try{
    const rawV2 = localStorage.getItem('gitaTestProgressV2');
    if(rawV2){
      const old = JSON.parse(rawV2);
      const fresh = defaultProgress();
      if(old.random) fresh.random = old.random;
      if(old.sequential) fresh.sequential = old.sequential;
      if(old.mode) fresh.mode = old.mode;
      return fresh;
    }
    const rawV1 = localStorage.getItem('gitaTestProgress');
    if(rawV1){
      const old = JSON.parse(rawV1);
      const fresh = defaultProgress();
      fresh.random.tested = old.tested || [];
      fresh.random.round = old.round || 1;
      return fresh;
    }
  }catch(e){}
  return defaultProgress();
}

function saveProgress(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
}

function keyOf(item){ return item.c + '-' + item.v; }

function findByKey(key){
  return GITA.find(it => keyOf(it) === key) || null;
}

function toDevanagariNum(n){
  const map = ['०','१','२','३','४','५','६','७','८','९'];
  return String(n).split('').map(d => map[parseInt(d)]).join('');
}

function scopedVerses(){
  const sel = new Set(progress.selectedChapters);
  return GITA.filter(item => sel.has(item.c));
}

/* ---------- SCOPE / CHAPTER SELECTION ---------- */

function scopeSummaryText(){
  const sel = progress.selectedChapters.slice().sort((a,b)=>a-b);
  if(sel.length === ALL_CHAPTERS.length) return 'सम्पूर्ण गीता (18 अध्याय)';
  if(sel.length === 1) return 'अध्याय ' + toDevanagariNum(sel[0]) + ' — ' + CHAPTER_TITLES[sel[0]];
  if(sel.length === 0) return 'कोई अध्याय चयनित नहीं';
  // detect contiguous range
  let contiguous = true;
  for(let i=1;i<sel.length;i++){ if(sel[i] !== sel[i-1]+1){ contiguous = false; break; } }
  if(contiguous){
    return 'अध्याय ' + toDevanagariNum(sel[0]) + '–' + toDevanagariNum(sel[sel.length-1]) + ' (' + sel.length + ' अध्याय)';
  }
  return sel.length + ' अध्याय चयनित (' + sel.map(toDevanagariNum).join(', ') + ')';
}

function updateScopeSummary(){
  document.getElementById('scopeValue').textContent = scopeSummaryText();
}

function populateChapterGrid(){
  const grid = document.getElementById('chapterGrid');
  const selSet = new Set(progress.selectedChapters);
  grid.innerHTML = ALL_CHAPTERS.map(c => {
    const count = GITA.filter(it => it.c === c).length;
    const checked = selSet.has(c) ? 'checked' : '';
    return `
      <label class="chapter-row">
        <input type="checkbox" data-ch="${c}" ${checked}>
        <span class="chnum">${toDevanagariNum(c)}</span>
        <span class="chtitle">${CHAPTER_TITLES[c]}</span>
        <span class="chcount">${count} श्लोक</span>
      </label>
    `;
  }).join('');
}

function openScopeModal(){
  populateChapterGrid();
  document.getElementById('scopeModalOverlay').classList.add('open');
}

function closeScopeModal(){
  document.getElementById('scopeModalOverlay').classList.remove('open');
}

function applyScopeSelection(){
  const boxes = document.querySelectorAll('#chapterGrid input[type=checkbox]');
  const chosen = [];
  boxes.forEach(b => { if(b.checked) chosen.push(parseInt(b.getAttribute('data-ch'))); });

    showInfoModal('कृपया कम से कम एक अध्याय चुनें।');

  }
  progress.selectedChapters = chosen;
  progress.random = { tested: [], round: 1, pending: null };

}

document.getElementById('scopeSummary').addEventListener('click', openScopeModal);
document.getElementById('cancelScopeBtn').addEventListener('click', closeScopeModal);

});
document.getElementById('scopeModalOverlay').addEventListener('click', (e) => {

});

/* ---------- RANDOM MODE ---------- */

function randomRemainingPool(){
  const testedSet = new Set(progress.random.tested);
  return scopedVerses().filter(item => !testedSet.has(keyOf(item)));
}

function getRandomCurrent(){
  const st = progress.random;
  if(st.pending){
    const item = findByKey(st.pending);
    const inScope = item && progress.selectedChapters.includes(item.c);
    if(item && inScope && !st.tested.includes(st.pending)){
      return item;
    }
  }
  const pool = randomRemainingPool();
  if(pool.length === 0) return null;
  const idx = Math.floor(Math.random() * pool.length);
  const item = pool[idx];
  st.pending = keyOf(item);
  saveProgress();
  return item;
}

function advanceRandom(){
  progress.random.pending = null;
  saveProgress();
}

function resetRandom(){
  progress.random = { tested: [], round: progress.random.round + 1, pending: null };
  saveProgress();
}

/* ---------- SEQUENTIAL MODE ---------- */

function sequentialList(){
  return scopedVerses(); // GITA is already in chapter/verse ascending order, filter preserves order
}

function getSequentialCurrent(){
  const list = sequentialList();
  const st = progress.sequential;
  if(st.position >= list.length) return null;
  return list[st.position];
}

function advanceSequential(){
  progress.sequential.position += 1;
  saveProgress();
}

function resetSequential(){
  progress.sequential = { position: 0, round: progress.sequential.round + 1 };
  saveProgress();
}

/* ---------- SHARED RENDER LOGIC ---------- */

function currentItem(){
  return progress.mode === 'random' ? getRandomCurrent() : getSequentialCurrent();
}

function progressCounts(){
  const total = scopedVerses().length;
  let done, round;
  if(progress.mode === 'random'){
    done = progress.random.tested.length;
    round = progress.random.round;
  } else {
    done = Math.min(progress.sequential.position, total);
    round = progress.sequential.round;
  }
  return { done, total, round };
}

function updateProgressBar(){
  const { done, total, round } = progressCounts();
  document.getElementById('progressLabel').textContent = done + ' / ' + total;
  document.getElementById('roundLabel').textContent = 'चक्र ' + round;
  const pct = total > 0 ? Math.min(100, Math.round((done/total)*100)) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
}

function updateModePills(){
  document.getElementById('modeRandomBtn').classList.toggle('active', progress.mode === 'random');
  document.getElementById('modeSeqBtn').classList.toggle('active', progress.mode === 'sequential');
  document.getElementById('modeTimedBtn').classList.toggle('active', progress.mode === 'timed');
}

function renderCurrent(){
  updateModePills();
  updateScopeSummary();
  if(progress.mode === 'timed'){
    document.getElementById('progressCard').style.display = 'none';
    renderTimedFlow();
    return;
  }
  document.getElementById('progressCard').style.display = 'flex';
  hideTimerTopbar();
  updateProgressBar();
  const item = currentItem();
  if(!item){
    renderRoundComplete();
    return;
  }
  revealed = false;
  renderPrompt(item);
}

function renderPrompt(item){
  const card = document.getElementById('mainCard');
  const modeLabel = progress.mode === 'random' ? 'यादृच्छिक क्रम' : 'क्रमबद्ध क्रम';
  card.innerHTML = `
    <div class="prompt-eyebrow">श्लोक स्मरण कीजिए · ${modeLabel}</div>
    <div class="chapter-title">अध्याय ${toDevanagariNum(item.c)} — ${item.ct}</div>
    <div class="verse-ref">
      श्लोक ${toDevanagariNum(item.v)}
      <span class="small">अध्याय ${toDevanagariNum(item.c)}, श्लोक ${toDevanagariNum(item.v)}</span>
    </div>
    <div class="recall-hint">इस श्लोक को मन ही मन स्मरण करें, फिर उत्तर देखने के लिए नीचे दबाएँ।</div>
    <button class="btn btn-primary" id="showAnswerBtn">उत्तर दिखाएँ</button>
  `;
  document.getElementById('showAnswerBtn').addEventListener('click', () => revealAnswer(item));
}

function revealAnswer(item){
  revealed = true;
  if(progress.mode === 'random'){
    if(!progress.random.tested.includes(keyOf(item))){
      progress.random.tested.push(keyOf(item));
    }
    saveProgress();
  }
  const card = document.getElementById('mainCard');
  const speakerHtml = item.sp ? `<div class="divider-speaker">${item.sp}</div>` : '';
  card.innerHTML = `
    <div class="answer-meta">अध्याय ${toDevanagariNum(item.c)} — ${item.ct} · श्लोक ${toDevanagariNum(item.v)}</div>
    ${speakerHtml}
    <div class="shloka-text">${item.t}</div>
    <button class="btn btn-primary" id="nextBtn">अगला श्लोक</button>
    <button class="btn btn-secondary" id="resetBtn">प्रगति रीसेट करें</button>
  `;
  document.getElementById('nextBtn').addEventListener('click', () => {
    if(progress.mode === 'random') advanceRandom(); else advanceSequential();
    renderCurrent();
  });
  document.getElementById('resetBtn').addEventListener('click', resetCurrentModeProgress);
  updateProgressBar();
}

function renderRoundComplete(){
  const card = document.getElementById('mainCard');
  const modeLabel = progress.mode === 'random' ? 'यादृच्छिक क्रम' : 'क्रमबद्ध क्रम';
  const total = scopedVerses().length;
  card.innerHTML = `
    <div class="done-banner">
      <div class="om">ॐ</div>
      <h2>चयनित अध्यायों का एक चक्र पूर्ण हुआ!</h2>
      <p>${modeLabel} में चयनित दायरे के सभी ${total} श्लोक इस चक्र में पूछे जा चुके हैं। अगला चक्र आरंभ करने के लिए नीचे दबाएँ, या ऊपर से अध्याय-चयन बदलें।</p>
      <button class="btn btn-primary" id="newRoundBtn" style="margin-top:16px;">नया चक्र आरंभ करें</button>
    </div>
  `;
  document.getElementById('newRoundBtn').addEventListener('click', () => {
    if(progress.mode === 'random') resetRandom(); else resetSequential();
    renderCurrent();
  });
  updateProgressBar();
}

function resetCurrentModeProgress(){
  const modeLabel = progress.mode === 'random' ? 'यादृच्छिक क्रम' : 'क्रमबद्ध क्रम';
  showConfirmModal(
    modeLabel + ' की आपकी प्रगति मिटा दी जाएगी। क्या आप वाकई आगे बढ़ना चाहते हैं?',
    () => {
      if(progress.mode === 'random'){
        progress.random = { tested: [], round: 1, pending: null };
      } else {
        progress.sequential = { position: 0, round: 1 };
      }
      saveProgress();
      renderCurrent();
    }
  );
}

function switchMode(mode){
  if(progress.mode === mode) return;
  if(progress.mode === 'timed') stopTimedInterval();
  progress.mode = mode;
  saveProgress();
  renderCurrent();
}

document.getElementById('modeRandomBtn').addEventListener('click', () => switchMode('random'));
document.getElementById('modeSeqBtn').addEventListener('click', () => switchMode('sequential'));
document.getElementById('modeTimedBtn').addEventListener('click', () => switchMode('timed'));

/* ============ TIMED TEST MODE ("समयबद्ध परीक्षा") ============ */

// transient, in-memory only (not persisted across full page reloads)
let timedState = null; // {phase:'setup'|'running'|'result', style, pool:[], sessionTested:Set, cursor, verseDeadlineAt, sessionEndAt, promptShownAt, results:{...}}
let timedIntervalId = null;

function formatMMSS(ms){
  const totalSec = Math.max(0, Math.ceil(ms/1000));
  const m = Math.floor(totalSec/60);
  const s = totalSec % 60;
  return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

function stopTimedInterval(){
  if(timedIntervalId){
    clearInterval(timedIntervalId);
    timedIntervalId = null;
  }
}

function hideTimerTopbar(){
  document.getElementById('timerTopbar').classList.remove('show');
}

function showTimerTopbar(label, valueText, low){
  const bar = document.getElementById('timerTopbar');
  bar.classList.add('show');
  document.getElementById('timerTopbarLabel').textContent = label;
  const valEl = document.getElementById('timerTopbarValue');
  valEl.textContent = valueText;
  valEl.classList.toggle('low', !!low);
}

function timedScopedPool(excludeKeys){
  const ex = new Set(excludeKeys);
  return scopedVerses().filter(item => !ex.has(keyOf(item)));
}

function renderTimedFlow(){
  if(!timedState || timedState.phase === 'setup'){
    hideTimerTopbar();
    renderTimedSetup();
    return;
  }
  if(timedState.phase === 'running'){
    ensureTimedIntervalRunning();
    if(timedState.style === 'countdown') resumeCountdownRunning();
    else if(timedState.style === 'session') resumeSessionRunning();
    else resumeMeasureRunning();
    timedTick(); // populate timer display immediately, don't wait for first interval fire
    return;
  }
  if(timedState.phase === 'result'){
    hideTimerTopbar();
    renderTimedResults();
  }
}

function ensureTimedIntervalRunning(){
  if(!timedIntervalId){
    timedIntervalId = setInterval(timedTick, 250);
  }
}

function startTimedTest(){
  const cfg = progress.timedConfig;
  const pool = scopedVerses();
  if(pool.length === 0){
    showInfoModal('चयनित दायरे में कोई श्लोक नहीं है। कृपया ऊपर से अध्याय चुनें।');
    return;
  }
  timedState = {
    phase: 'running',
    style: cfg.style,
    order: cfg.order,
    sessionTested: new Set(),
    cursor: 0,
    currentItem: null,
    verseDeadlineAt: null,
    sessionEndAt: cfg.style === 'session' ? (Date.now() + cfg.sessionMinutes*60*1000) : null,
    promptShownAt: null,
    results: { attempted: 0, timedOut: 0, perVerseSeconds: [] }
  };
  pickNextTimedVerse();
  if(timedState.style === 'countdown') startCountdownForCurrent();
  else if(timedState.style === 'measure') timedState.promptShownAt = Date.now();
  renderTimedFlow();
}

function pickNextTimedVerse(){
  if(timedState.order === 'sequential'){
    const list = scopedVerses(); // already chapter/verse ascending
    if(timedState.cursor >= list.length){
      timedState.currentItem = null;
      return;
    }
    timedState.currentItem = list[timedState.cursor];
    timedState.cursor += 1;
    return;
  }
  const pool = timedScopedPool(timedState.sessionTested);
  if(pool.length === 0){
    timedState.currentItem = null;
    return;
  }
  const idx = Math.floor(Math.random() * pool.length);
  timedState.currentItem = pool[idx];
}

function startCountdownForCurrent(){
  timedState.verseDeadlineAt = Date.now() + progress.timedConfig.perShlokaSeconds*1000;
  timedState.verseRevealed = false;
  timedState.verseTimedOut = false;
}

/* ---- Countdown style ---- */

function resumeCountdownRunning(){
  hideTimerTopbar();
  const item = timedState.currentItem;
  if(!item){ finishTimedTest(); return; }
  const card = document.getElementById('mainCard');
  if(!timedState.verseRevealed){
    card.innerHTML = `
      <div class="prompt-eyebrow">समयबद्ध परीक्षा · प्रति श्लोक उलटी गिनती · ${timedState.order==='sequential'?'क्रमबद्ध':'यादृच्छिक'}</div>
      <div class="chapter-title">अध्याय ${toDevanagariNum(item.c)} — ${item.ct}</div>
      <div class="verse-ref">
        श्लोक ${toDevanagariNum(item.v)}
      </div>
      <div class="big-timer" id="bigTimer">--</div>
      <div class="recall-hint">इस श्लोक को मन ही मन स्मरण करें।</div>
      <button class="btn btn-primary" id="showAnswerBtn">उत्तर दिखाएँ</button>
      <button class="btn btn-secondary" id="stopTimedBtn">परीक्षा समाप्त करें</button>
    `;
    document.getElementById('showAnswerBtn').addEventListener('click', () => {
      revealTimedCountdown(item, false);
    });
    document.getElementById('stopTimedBtn').addEventListener('click', confirmStopTimedTest);
  } else {
    renderCountdownAnswer(item);
  }
}

function revealTimedCountdown(item, timedOut){
  timedState.verseRevealed = true;
  timedState.verseTimedOut = timedOut;
  timedState.results.attempted += 1;
  if(timedOut) timedState.results.timedOut += 1;
  if(!timedState.sessionTested.has(keyOf(item))) timedState.sessionTested.add(keyOf(item));
  renderCountdownAnswer(item);
}

function renderCountdownAnswer(item){
  const card = document.getElementById('mainCard');
  const speakerHtml = item.sp ? `<div class="divider-speaker">${item.sp}</div>` : '';
  const timeoutTag = timedState.verseTimedOut ? `<div class="timeout-tag">⏱ समय समाप्त — उत्तर स्वतः दिखाया गया</div>` : '';
  card.innerHTML = `
    <div class="answer-meta">अध्याय ${toDevanagariNum(item.c)} — ${item.ct} · श्लोक ${toDevanagariNum(item.v)}</div>
    ${timeoutTag}
    ${speakerHtml}
    <div class="shloka-text">${item.t}</div>
    <button class="btn btn-primary" id="nextTimedBtn">अगला श्लोक</button>
    <button class="btn btn-secondary" id="stopTimedBtn">परीक्षा समाप्त करें</button>
  `;
  document.getElementById('nextTimedBtn').addEventListener('click', () => {
    pickNextTimedVerse();
    if(!timedState.currentItem){ finishTimedTest(); return; }
    startCountdownForCurrent();
    renderTimedFlow();
  });
  document.getElementById('stopTimedBtn').addEventListener('click', confirmStopTimedTest);
}

/* ---- Session style ---- */

function resumeSessionRunning(){
  const item = timedState.currentItem;
  if(!item){ finishTimedTest(); return; }
  const remaining = timedState.sessionEndAt - Date.now();
  showTimerTopbar('शेष समय', formatMMSS(remaining), remaining < 30000);
  const card = document.getElementById('mainCard');
  if(!timedState.verseRevealed){
    card.innerHTML = `
      <div class="prompt-eyebrow">समयबद्ध परीक्षा · सत्र चुनौती · ${timedState.order==='sequential'?'क्रमबद्ध':'यादृच्छिक'}</div>
      <div class="chapter-title">अध्याय ${toDevanagariNum(item.c)} — ${item.ct}</div>
      <div class="verse-ref">
        श्लोक ${toDevanagariNum(item.v)}
      </div>
      <div class="recall-hint">इस श्लोक को मन ही मन स्मरण करें, फिर उत्तर देखने के लिए नीचे दबाएँ।</div>
      <button class="btn btn-primary" id="showAnswerBtn">उत्तर दिखाएँ</button>
      <button class="btn btn-secondary" id="stopTimedBtn">परीक्षा समाप्त करें</button>
    `;
    document.getElementById('showAnswerBtn').addEventListener('click', () => {
      timedState.results.attempted += 1;
      timedState.verseRevealed = true;
      if(!timedState.sessionTested.has(keyOf(item))) timedState.sessionTested.add(keyOf(item));
      renderTimedFlow();
    });
    document.getElementById('stopTimedBtn').addEventListener('click', confirmStopTimedTest);
  } else {
    const speakerHtml = item.sp ? `<div class="divider-speaker">${item.sp}</div>` : '';
    card.innerHTML = `
      <div class="answer-meta">अध्याय ${toDevanagariNum(item.c)} — ${item.ct} · श्लोक ${toDevanagariNum(item.v)}</div>
      ${speakerHtml}
      <div class="shloka-text">${item.t}</div>
      <button class="btn btn-primary" id="nextTimedBtn">अगला श्लोक</button>
      <button class="btn btn-secondary" id="stopTimedBtn">परीक्षा समाप्त करें</button>
    `;
    document.getElementById('nextTimedBtn').addEventListener('click', () => {
      pickNextTimedVerse();
      timedState.verseRevealed = false;
      if(!timedState.currentItem){ finishTimedTest(); return; }
      renderTimedFlow();
    });
    document.getElementById('stopTimedBtn').addEventListener('click', confirmStopTimedTest);
  }
}

/* ---- Measure style ---- */

function resumeMeasureRunning(){
  hideTimerTopbar();
  const item = timedState.currentItem;
  if(!item){ finishTimedTest(); return; }
  const card = document.getElementById('mainCard');
  if(!timedState.verseRevealed){
    if(!timedState.promptShownAt) timedState.promptShownAt = Date.now();
    card.innerHTML = `
      <div class="prompt-eyebrow">समयबद्ध परीक्षा · समय-मापन · ${timedState.order==='sequential'?'क्रमबद्ध':'यादृच्छिक'}</div>
      <div class="chapter-title">अध्याय ${toDevanagariNum(item.c)} — ${item.ct}</div>
      <div class="verse-ref">
        श्लोक ${toDevanagariNum(item.v)}
      </div>
      <div class="stopwatch-line">बीता समय: <span id="stopwatchVal">00:00</span></div>
      <button class="btn btn-primary" id="showAnswerBtn">उत्तर दिखाएँ</button>
      <button class="btn btn-secondary" id="stopTimedBtn">परीक्षा समाप्त करें</button>
    `;
    document.getElementById('showAnswerBtn').addEventListener('click', () => {
      const elapsedSec = Math.round((Date.now() - timedState.promptShownAt)/1000);
      timedState.results.attempted += 1;
      timedState.results.perVerseSeconds.push(elapsedSec);
      timedState.verseRevealed = true;
      timedState.lastElapsedSec = elapsedSec;
      if(!timedState.sessionTested.has(keyOf(item))) timedState.sessionTested.add(keyOf(item));
      renderTimedFlow();
    });
    document.getElementById('stopTimedBtn').addEventListener('click', confirmStopTimedTest);
  } else {
    const speakerHtml = item.sp ? `<div class="divider-speaker">${item.sp}</div>` : '';
    card.innerHTML = `
      <div class="answer-meta">अध्याय ${toDevanagariNum(item.c)} — ${item.ct} · श्लोक ${toDevanagariNum(item.v)}</div>
      <div class="stopwatch-line">आपने ${toDevanagariNum(timedState.lastElapsedSec)} सेकंड में उत्तर देखा</div>
      ${speakerHtml}
      <div class="shloka-text">${item.t}</div>
      <button class="btn btn-primary" id="nextTimedBtn">अगला श्लोक</button>
      <button class="btn btn-secondary" id="stopTimedBtn">परीक्षा समाप्त करें</button>
    `;
    document.getElementById('nextTimedBtn').addEventListener('click', () => {
      pickNextTimedVerse();
      timedState.verseRevealed = false;
      timedState.promptShownAt = null;
      if(!timedState.currentItem){ finishTimedTest(); return; }
      renderTimedFlow();
    });
    document.getElementById('stopTimedBtn').addEventListener('click', confirmStopTimedTest);
  }
}

/* ---- Tick / interval ---- */

function timedTick(){
  if(!timedState || timedState.phase !== 'running') return;

  if(timedState.style === 'countdown' && !timedState.verseRevealed && timedState.verseDeadlineAt){
    const remaining = timedState.verseDeadlineAt - Date.now();
    const timerEl = document.getElementById('bigTimer');
    if(timerEl){
      const secs = Math.max(0, Math.ceil(remaining/1000));
      timerEl.textContent = toDevanagariNum(secs);
      timerEl.classList.toggle('low', secs <= 5);
    }
    if(remaining <= 0){
      revealTimedCountdown(timedState.currentItem, true);
    }
  } else if(timedState.style === 'session'){
    const remaining = timedState.sessionEndAt - Date.now();
    if(document.getElementById('timerTopbarValue')){
      showTimerTopbar('शेष समय', formatMMSS(remaining), remaining < 30000);
    }
    if(remaining <= 0){
      finishTimedTest();
    }
  } else if(timedState.style === 'measure' && !timedState.verseRevealed && timedState.promptShownAt){
    const el = document.getElementById('stopwatchVal');
    if(el){
      el.textContent = formatMMSS(Date.now() - timedState.promptShownAt);
    }
  }
}

function confirmStopTimedTest(){
  showConfirmModal(
    'क्या आप वाकई यह समयबद्ध परीक्षा समाप्त करना चाहते हैं?',
    () => finishTimedTest()
  );
}

function finishTimedTest(){
  stopTimedInterval();
  timedState.phase = 'result';
  renderTimedFlow();
}

function renderTimedResults(){
  const card = document.getElementById('mainCard');
  const r = timedState.results;
  const style = timedState.style;
  let statsHtml = '';
  if(style === 'countdown'){
    statsHtml = `
      <div class="result-stats">
        <div class="result-stat"><span class="stat-value">${toDevanagariNum(r.attempted)}</span><span class="stat-label">कुल प्रयास</span></div>
        <div class="result-stat"><span class="stat-value">${toDevanagariNum(r.attempted - r.timedOut)}</span><span class="stat-label">समय पर उत्तर</span></div>
        <div class="result-stat"><span class="stat-value">${toDevanagariNum(r.timedOut)}</span><span class="stat-label">समय समाप्त</span></div>
      </div>
    `;
  } else if(style === 'session'){
    statsHtml = `
      <div class="result-stats">
        <div class="result-stat"><span class="stat-value">${toDevanagariNum(r.attempted)}</span><span class="stat-label">श्लोक पूर्ण किए</span></div>
        <div class="result-stat"><span class="stat-value">${toDevanagariNum(progress.timedConfig.sessionMinutes)}</span><span class="stat-label">मिनट का सत्र</span></div>
      </div>
    `;
  } else {
    const times = r.perVerseSeconds;
    const avg = times.length ? Math.round(times.reduce((a,b)=>a+b,0)/times.length) : 0;
    const fastest = times.length ? Math.min(...times) : 0;
    const slowest = times.length ? Math.max(...times) : 0;
    statsHtml = `
      <div class="result-stats">
        <div class="result-stat"><span class="stat-value">${toDevanagariNum(r.attempted)}</span><span class="stat-label">कुल श्लोक</span></div>
        <div class="result-stat"><span class="stat-value">${toDevanagariNum(avg)}</span><span class="stat-label">औसत सेकंड</span></div>
        <div class="result-stat"><span class="stat-value">${toDevanagariNum(fastest)}</span><span class="stat-label">सबसे तेज़ (से.)</span></div>
        <div class="result-stat"><span class="stat-value">${toDevanagariNum(slowest)}</span><span class="stat-label">सबसे धीमा (से.)</span></div>
      </div>
    `;
  }
  card.innerHTML = `
    <div class="done-banner">
      <div class="om">ॐ</div>
      <h2>समयबद्ध परीक्षा पूर्ण हुई!</h2>
      ${statsHtml}
      <button class="btn btn-primary" id="newTimedBtn" style="margin-top:10px;">नई समयबद्ध परीक्षा प्रारम्भ करें</button>
    </div>
  `;
  document.getElementById('newTimedBtn').addEventListener('click', () => {
    timedState = null;
    renderTimedFlow();
  });
}

renderCurrent();

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(() => {
      // silently ignore if not served over http(s) (e.g. opened as a local file)
    });
  });
}
</script>
